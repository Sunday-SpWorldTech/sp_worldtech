<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Login | SP WorldTech</title><link rel="icon" type="image/png" href="./assets/favicon.png"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/><link rel="stylesheet" href="./assets/styles.css"/><meta name="robots" content="noindex, nofollow"/></head><body class="sp-auth-live-page compact-auth"><main class="sp-auth-single"><section class="sp-auth-live-panel" aria-label="User login form"><a class="sp-auth-brand-line center" href="./index.html"><img src="./assets/logo.png" alt="SP WorldTech logo"/></a><form class="sp-live-form active" id="userLoginForm"><div class="sp-form-header center"><h2>Login</h2></div><label for="loginIdentifier">Email or Username</label><input id="loginIdentifier" name="identifier" autocomplete="username" required/><label for="loginPassword">Password</label><input id="loginPassword" name="password" type="password" autocomplete="current-password" required/><button class="sp-auth-primary" type="submit">Continue</button><p class="status-text" id="loginStatus" role="status"></p></form><form class="sp-live-form hidden" id="userPinForm"><div class="sp-form-header center"><h2>Account PIN</h2></div><label for="loginPin">PIN</label><input id="loginPin" name="pin" type="password" inputmode="numeric" maxlength="8" pattern="[0-9]{4,8}" required/><button class="sp-auth-primary" type="submit">Open Dashboard</button><button class="sp-auth-secondary" id="backToPasswordBtn" type="button">Back</button><p class="status-text" id="pinStatus" role="status"></p></form><div class="sp-auth-bottom-links"><span>New here?</span><a href="./signup.html">Create account</a></div></section></main><script src="./assets/config.js"></script><script src="./assets/user-auth.js"></script></body></html>
