<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Create Account | SP WorldTech</title><link rel="icon" type="image/png" href="./assets/favicon.png"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/><link rel="stylesheet" href="./assets/styles.css"/><meta name="robots" content="noindex, nofollow"/></head><body class="sp-auth-live-page compact-auth"><main class="sp-auth-single signup-single"><section class="sp-auth-live-panel" aria-label="User registration form"><a class="sp-auth-brand-line center" href="./index.html"><img src="./assets/logo.png" alt="SP WorldTech logo"/></a><form class="sp-live-form" id="userSignupForm"><div class="sp-form-header center"><h2>Create Account</h2></div><div class="auth-two-col"><label>Full Name<input id="signupFullName" name="fullName" autocomplete="name" required/></label><label>Username<input id="signupUsername" name="username" autocomplete="username" required/></label></div><label>Email<input id="signupEmail" name="email" type="email" autocomplete="email" required/></label><label>Phone<input id="signupPhone" name="phone" type="tel" autocomplete="tel"/></label><label>Role / Access<select id="signupAccessType" name="accountType" required><option value="general_user">General User</option><option value="job_worker">Jobs / Worker</option><option value="academy_student">Academy Student</option><option value="banking_crypto_client">Banking & Crypto</option></select></label><div class="auth-two-col"><label>Password<input id="signupPassword" name="password" type="password" autocomplete="new-password" minlength="8" required/></label><label>PIN<input id="signupPin" name="pin" type="password" inputmode="numeric" maxlength="8" pattern="[0-9]{4,8}" required/></label></div><label>Confirm PIN<input id="signupConfirmPin" name="confirmPin" type="password" inputmode="numeric" maxlength="8" pattern="[0-9]{4,8}" required/></label><button class="sp-auth-primary" type="submit">Create Account</button><p class="status-text" id="signupStatus" role="status"></p></form><div class="sp-auth-bottom-links"><span>Already registered?</span><a href="./login.html">Login</a></div></section></main><script src="./assets/config.js"></script><script src="./assets/user-auth.js"></script></body></html>
